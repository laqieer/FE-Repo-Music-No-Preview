name: Sync upstream

on:
  workflow_dispatch:
    inputs:
      push:
        description: Push the rewritten history back to this repository
        required: false
        type: boolean
        default: false
      keep_temp:
        description: Keep the temporary workspace for debugging
        required: false
        type: boolean
        default: false
      show_plan:
        description: Print the resolved config and exit without cloning
        required: false
        type: boolean
        default: false
  schedule:
    - cron: "0 9 * * 1"

permissions:
  contents: write

concurrency:
  group: sync-upstream
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install git-filter-repo
        run: python -m pip install --disable-pip-version-check git-filter-repo

      - name: Configure Git author
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run sync automation
        env:
          EVENT_NAME: ${{ github.event_name }}
          GITHUB_REPOSITORY_NAME: ${{ github.repository }}
          GITHUB_TOKEN_FOR_PUSH: ${{ github.token }}
          INPUT_PUSH: ${{ inputs.push }}
          INPUT_KEEP_TEMP: ${{ inputs.keep_temp }}
          INPUT_SHOW_PLAN: ${{ inputs.show_plan }}
          SYNC_PUSH_TOKEN: ${{ secrets.SYNC_PUSH_TOKEN }}
        run: |
          set -euo pipefail
          push_token="${SYNC_PUSH_TOKEN:-$GITHUB_TOKEN_FOR_PUSH}"
          export SYNC_ORIGIN_URL="https://x-access-token:${push_token}@github.com/${GITHUB_REPOSITORY_NAME}.git"
          args=(--config sync-config.json)

          if [[ "${INPUT_SHOW_PLAN:-false}" == "true" ]]; then
            args+=(--show-plan)
          fi

          if [[ "${EVENT_NAME}" == "schedule" ]]; then
            args+=(--push)
          elif [[ "${INPUT_PUSH:-false}" == "true" ]]; then
            args+=(--push)
          fi

          if [[ "${INPUT_KEEP_TEMP:-false}" == "true" ]]; then
            args+=(--keep-temp)
          fi

          python tools/sync_upstream.py "${args[@]}"
